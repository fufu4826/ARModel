{% set meta_title = page_title|default(default_meta_title, true) %}
{% set meta_description = page_description|default(default_meta_description, true) %}
{% set meta_image = page_image|default(default_meta_image, true) %}
{% set meta_url = page_url|default(public_site_url ~ request.path, true) %}
<meta name="description" content="{{ meta_description }}" />
<link rel="canonical" href="{{ meta_url }}" />
<meta property="og:title" content="{{ meta_title }}" />
<meta property="og:description" content="{{ meta_description }}" />
<meta property="og:image" content="{{ meta_image }}" />
<meta property="og:url" content="{{ meta_url }}" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="{{ default_site_name }}" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ meta_title }}" />
<meta name="twitter:description" content="{{ meta_description }}" />
<meta name="twitter:image" content="{{ meta_image }}" />
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
<link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}" />
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}" />
